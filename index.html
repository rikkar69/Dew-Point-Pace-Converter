<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#2D353B" id="theme-color-meta">
<title>NSM Resource Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root,
  [data-theme="dark"]{
    --paper:#2D353B;
    --paper-2:#343F44;
    --ink:#D3C6AA;
    --ink-soft:#9DA9A0;
    --line:#475258;
    --pine:#A7C080;
    --pine-2:#83C092;
    --field:#343F44;
    --s0:#A7C080;
    --s2:#DBBC7F;

    --radius:14px;
    --shadow:0 1px 2px rgba(0,0,0,.18), 0 8px 24px rgba(0,0,0,.22);
  }

  [data-theme="light"]{
    --paper:#FFFBEF;
    --paper-2:#F2EFDB;
    --ink:#5C6A72;
    --ink-soft:#829181;
    --line:#E8E5CF;
    --pine:#8DA101;
    --pine-2:#35A77C;
    --field:#FFFFFF;
    --s0:#8DA101;
    --s2:#DFA000;

    --shadow:0 1px 2px rgba(92,106,114,.06), 0 8px 24px rgba(92,106,114,.08);
  }

  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:"DM Sans",system-ui,sans-serif;
    font-size:16px;
    line-height:1.45;
    -webkit-font-smoothing:antialiased;
    padding:max(28px,env(safe-area-inset-top)) 18px 56px;
    display:flex;
    justify-content:center;
    transition:background .15s ease, color .15s ease;
  }
  .wrap{width:100%;max-width:720px}

  header{margin:6px 0 30px}
  .header-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
  .eyebrow{
    font-family:"DM Mono",monospace;
    font-size:12px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--pine-2);margin:0 0 6px;
    display:flex;align-items:center;gap:8px;
  }
  .flag{flex:none;border-radius:2px}
  .theme-toggle{
    flex:none;width:34px;height:34px;border-radius:9px;
    border:1px solid var(--line);background:var(--field);color:var(--ink);
    cursor:pointer;display:flex;align-items:center;justify-content:center;
    font-size:15px;line-height:1;transition:background .15s ease;
  }
  .theme-toggle:hover{background:var(--paper-2)}
  h1{
    font-family:"Fraunces",serif;
    font-weight:500;font-size:40px;line-height:1.04;
    letter-spacing:-.01em;margin:0;
    font-variation-settings:"opsz" 60;
  }
  .sub{color:var(--ink-soft);font-size:15px;margin:10px 0 0;max-width:46ch}

  .grid{
    display:grid;grid-template-columns:repeat(auto-fill, minmax(260px, 1fr));
    gap:16px;
  }
  .tool-card{
    display:flex;flex-direction:column;gap:10px;
    background:var(--field);border:1px solid var(--line);border-radius:14px;
    box-shadow:var(--shadow);padding:20px;
    text-decoration:none;color:inherit;
    transition:transform .12s ease;
  }
  .tool-card:hover{transform:translateY(-2px)}
  .tool-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .tool-icon{font-size:26px;line-height:1}
  .tool-status{
    display:inline-flex;align-items:center;gap:6px;
    font-family:"DM Mono",monospace;font-size:11px;letter-spacing:.04em;text-transform:uppercase;
  }
  .tool-status .dot{width:7px;height:7px;border-radius:50%}
  .tool-title{
    font-family:"Fraunces",serif;font-weight:500;font-size:21px;line-height:1.15;
    margin:0;font-variation-settings:"opsz" 40;
  }
  .tool-desc{font-size:13.5px;color:var(--ink-soft);margin:0;line-height:1.5}

  footer{text-align:center;font-size:12px;color:var(--ink-soft);margin-top:36px;line-height:1.6}
  footer b{color:var(--ink);font-weight:500}

  @media (prefers-reduced-motion:reduce){
    *{transition:none!important}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="header-top">
      <p class="eyebrow">
        <svg class="flag" width="18" height="13" viewBox="0 0 22 16" aria-hidden="true">
          <rect width="22" height="16" fill="#EF2B2D"/>
          <rect x="6" width="4" height="16" fill="#fff"/>
          <rect y="6" width="22" height="4" fill="#fff"/>
          <rect x="7" width="2" height="16" fill="#002868"/>
          <rect y="7" width="22" height="2" fill="#002868"/>
        </svg>
        Norwegian Singles Method
      </p>
      <button type="button" id="theme-toggle" class="theme-toggle" aria-label="Switch to light mode" aria-pressed="false">
        <span class="theme-icon" aria-hidden="true">☾</span>
      </button>
    </div>
    <h1>NSM Resource Hub</h1>
    <p class="sub">A small kit of tools for training the Norwegian Singles way - pace math and planning helpers, in one place.</p>
  </header>

  <div class="grid" id="tool-grid"></div>

  <footer>
    Built for runners following the <b>Norwegian Singles Method</b> of subthreshold training.<br>
    A guide, not gospel — trust how you feel out there.
  </footer>
</div>

<script>
(() => {
  "use strict";

  const store = {
    get(k){ try { return localStorage.getItem(k); } catch { return null; } },
    set(k,v){ try { localStorage.setItem(k,v); } catch {} },
  };

  const themeMeta = document.getElementById("theme-color-meta");
  const themeToggle = document.getElementById("theme-toggle");
  const themeIcon = themeToggle.querySelector(".theme-icon");
  const THEME_COLORS = { dark:"#2D353B", light:"#FFFBEF" };

  function applyTheme(theme){
    document.documentElement.setAttribute("data-theme", theme);
    themeMeta.setAttribute("content", THEME_COLORS[theme]);
    themeIcon.textContent = theme === "dark" ? "☾" : "☀";
    themeToggle.setAttribute("aria-pressed", String(theme === "light"));
    themeToggle.setAttribute("aria-label", theme === "dark" ? "Switch to light mode" : "Switch to dark mode");
  }

  let theme = store.get("nsm_theme") || "dark";
  applyTheme(theme);
  themeToggle.addEventListener("click", () => {
    theme = theme === "dark" ? "light" : "dark";
    store.set("nsm_theme", theme);
    applyTheme(theme);
  });

  const TOOLS = [
    { title: "Dew Point Pace Converter", desc: "Live or historical humidity conditions, converted into the pace your body will actually hold.", href: "dew-point.html", icon: "💧", status: "Live" },
    { title: "Sub-T Pace Converter", desc: "Turn a recent 5K time into 3, 6, and 10-minute subthreshold rep paces.", href: "sub-t.html", icon: "📈", status: "Live" },
  ];

  function escapeHtml(str){
    return String(str).replace(/[&<>"']/g, c => ({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
    }[c]));
  }

  const grid = document.getElementById("tool-grid");
  grid.innerHTML = TOOLS.map(t => `
    <a href="${escapeHtml(t.href)}" class="tool-card">
      <div class="tool-top">
        <span class="tool-icon">${t.icon}</span>
        <span class="tool-status" style="color:var(--s0)"><span class="dot" style="background:var(--s0)"></span>${escapeHtml(t.status)}</span>
      </div>
      <h2 class="tool-title">${escapeHtml(t.title)}</h2>
      <p class="tool-desc">${escapeHtml(t.desc)}</p>
    </a>`).join("");
})();
</script>
<script data-goatcounter="https://rikkar69.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
</body>
</html>
